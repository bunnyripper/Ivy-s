<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivy 👑</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  min-height:100vh;
  background:linear-gradient(135deg,#ffe0f0,#fff0f5,#fce4ec);
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  transition:background 1s;
}

/* ── FLOATERS ── */
.floater{
  position:fixed;
  font-size:22px;
  animation:floatUp linear infinite;
  pointer-events:none;
  z-index:0;
  opacity:0.2;
}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%{opacity:0.2;}
  90%{opacity:0.2;}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}

/* ── MAIN CARD ── */
#mainCard{
  position:relative;
  z-index:10;
  background:white;
  border-radius:30px;
  padding:35px 25px 25px;
  max-width:420px;
  width:92%;
  margin:auto;
  margin-top:max(20px, 5vh);
  box-shadow:0 20px 60px rgba(255,105,180,0.3),0 0 0 3px #ff69b4;
  text-align:center;
  animation:cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardPop{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.page-title{
  font-family:'Pacifico',cursive;
  font-size:clamp(22px,6vw,30px);
  color:#ff1493;
  margin-bottom:4px;
}
.page-sub{font-size:12px;color:#f48fb1;margin-bottom:15px;letter-spacing:1px;}

#question{
  font-size:clamp(15px,4vw,20px);
  font-weight:700;
  color:#880e4f;
  min-height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:5px;
}

/* ── ARENA ── */
#arena{
  position:relative;
  height:180px;
  overflow:hidden;
  margin:8px 0;
  background:linear-gradient(to bottom,rgba(255,240,248,0.5),transparent);
  border-radius:16px;
}

/* ground line */
#arena::after{
  content:'';
  position:absolute;
  bottom:30px;left:5%;right:5%;
  height:2px;
  background:rgba(255,105,180,0.2);
  border-radius:2px;
}

/* ── CHARACTER BASE ── */
.char{
  position:absolute;
  bottom:32px;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:left 0.4s, right 0.4s;
}

#bunnyChar{left:30px;}
#catChar{right:30px;}

.char-label{
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:3px;
}
.bunny-label{color:#ff1493;}
.cat-label{color:#888;}

/* ── SPEECH BUBBLE ── */
.speech-bub{
  position:absolute;
  top:-52px;
  background:white;
  border:2px solid #ff69b4;
  border-radius:14px;
  padding:5px 10px;
  font-size:11px;
  font-weight:700;
  color:#880e4f;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.25s;
  pointer-events:none;
  z-index:30;
}
.speech-bub::after{
  content:'';
  position:absolute;
  bottom:-8px;left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top-color:#ff69b4;
}

/* ════════════════════════
   BUNNY SVG
════════════════════════ */
.bunny-wrap{
  position:relative;
  width:75px;
  height:120px;
  cursor:default;
  user-select:none;
}

/* body */
.b-body{
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:48px;height:55px;
  background:#f8f0ff;
  border-radius:24px 24px 18px 18px;
  box-shadow:inset -3px -3px 8px rgba(0,0,0,0.06);
}

/* belly spot */
.b-belly{
  position:absolute;
  bottom:8px;left:50%;
  transform:translateX(-50%);
  width:22px;height:26px;
  background:#ffe0f0;
  border-radius:50%;
}

/* head */
.b-head{
  position:absolute;
  bottom:42px;left:50%;
  transform:translateX(-50%);
  width:46px;height:44px;
  background:#f8f0ff;
  border-radius:50%;
  box-shadow:inset -2px -2px 6px rgba(0,0,0,0.06);
  z-index:2;
}

/* ears */
.b-ear{
  position:absolute;
  width:14px;height:38px;
  background:#f8f0ff;
  border-radius:50%;
  bottom:78px;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.b-ear-inner{
  position:absolute;
  width:7px;height:26px;
  background:#ffb6d9;
  border-radius:50%;
  top:6px;left:50%;
  transform:translateX(-50%);
}
.b-ear.left{left:10px;transform:rotate(-12deg);}
.b-ear.right{right:10px;transform:rotate(12deg);}

/* eyes */
.b-eye{
  position:absolute;
  width:10px;height:10px;
  background:#222;
  border-radius:50%;
  top:14px;
  transition:transform 0.2s;
}
.b-eye.left{left:8px;}
.b-eye.right{right:8px;}
/* eye shine */
.b-eye::after{
  content:'';
  position:absolute;
  width:3px;height:3px;
  background:white;
  border-radius:50%;
  top:1px;left:1px;
}
/* blink */
.b-eye{animation:eyeBlink 4s infinite;}
@keyframes eyeBlink{
  0%,44%,56%,100%{transform:scaleY(1);}
  50%{transform:scaleY(0.05);}
}

/* nose */
.b-nose{
  position:absolute;
  width:8px;height:5px;
  background:#ff85c2;
  border-radius:50%;
  top:25px;left:50%;
  transform:translateX(-50%);
}

/* mouth */
.b-mouth{
  position:absolute;
  top:31px;left:50%;
  transform:translateX(-50%);
  width:14px;height:7px;
  border:2px solid #333;
  border-top:none;
  border-radius:0 0 10px 10px;
  transition:all 0.3s;
}

/* cheeks */
.b-cheek{
  position:absolute;
  width:10px;height:6px;
  background:rgba(255,150,180,0.4);
  border-radius:50%;
  top:26px;
}
.b-cheek.left{left:3px;}
.b-cheek.right{right:3px;}

/* tail */
.b-tail{
  position:absolute;
  width:14px;height:14px;
  background:#f0e0ff;
  border-radius:50%;
  bottom:8px;right:-4px;
  animation:tailBob 1s ease-in-out infinite alternate;
}
@keyframes tailBob{
  from{transform:translateY(0) scale(1);}
  to{transform:translateY(-3px) scale(1.1);}
}

/* feet */
.b-foot{
  position:absolute;
  bottom:-8px;
  width:18px;height:10px;
  background:#f8f0ff;
  border-radius:50%;
}
.b-foot.left{left:4px;}
.b-foot.right{right:4px;}

/* arms */
.b-arm{
  position:absolute;
  width:12px;height:22px;
  background:#f8f0ff;
  border-radius:10px;
  bottom:30px;
  transition:transform 0.3s;
}
.b-arm.left{left:-4px;transform-origin:top center;transform:rotate(15deg);}
.b-arm.right{right:-4px;transform-origin:top center;transform:rotate(-15deg);}

/* ════════════════════════
   CAT SVG
════════════════════════ */
.cat-wrap{
  position:relative;
  width:75px;
  height:115px;
  cursor:default;
  user-select:none;
}

.c-body{
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  width:46px;height:52px;
  background:#d4d4d4;
  border-radius:22px 22px 16px 16px;
  box-shadow:inset -3px -3px 8px rgba(0,0,0,0.08);
}

.c-belly{
  position:absolute;
  bottom:6px;left:50%;
  transform:translateX(-50%);
  width:20px;height:24px;
  background:#ececec;
  border-radius:50%;
}

.c-head{
  position:absolute;
  bottom:40px;left:50%;
  transform:translateX(-50%);
  width:46px;height:42px;
  background:#d4d4d4;
  border-radius:50%;
  z-index:2;
}

/* cat ears (triangles) */
.c-ear{
  position:absolute;
  width:0;height:0;
  bottom:75px;
}
.c-ear.left{
  left:8px;
  border-left:9px solid transparent;
  border-right:9px solid transparent;
  border-bottom:22px solid #d4d4d4;
  transform:rotate(-8deg);
}
.c-ear.right{
  right:8px;
  border-left:9px solid transparent;
  border-right:9px solid transparent;
  border-bottom:22px solid #d4d4d4;
  transform:rotate(8deg);
}
/* ear inner */
.c-ear-inner{
  position:absolute;
  width:0;height:0;
}
.c-ear.left .c-ear-inner{
  border-left:5px solid transparent;
  border-right:5px solid transparent;
  border-bottom:14px solid #ffb6b6;
  top:6px;left:-5px;
}
.c-ear.right .c-ear-inner{
  border-left:5px solid transparent;
  border-right:5px solid transparent;
  border-bottom:14px solid #ffb6b6;
  top:6px;left:-5px;
}

.c-eye{
  position:absolute;
  width:10px;height:10px;
  background:#333;
  border-radius:50%;
  top:13px;
  transition:transform 0.2s;
  animation:eyeBlink 5s infinite 1s;
}
.c-eye.left{left:7px;}
.c-eye.right{right:7px;}
.c-eye::after{
  content:'';
  position:absolute;
  width:3px;height:3px;
  background:white;
  border-radius:50%;
  top:1px;left:1px;
}

/* cat has half lidded eyes when smug */
.c-lid{
  position:absolute;
  width:10px;height:5px;
  background:#d4d4d4;
  border-radius:5px 5px 0 0;
  top:13px;
  transition:height 0.3s;
}
.c-lid.left{left:7px;}
.c-lid.right{right:7px;}

.c-nose{
  position:absolute;
  width:8px;height:5px;
  background:#ff9999;
  border-radius:50%;
  top:24px;left:50%;
  transform:translateX(-50%);
}

.c-mouth{
  position:absolute;
  top:30px;left:50%;
  transform:translateX(-50%);
  width:14px;height:7px;
  border:2px solid #555;
  border-top:none;
  border-radius:0 0 10px 10px;
  transition:all 0.3s;
}

/* whiskers */
.c-whisker{
  position:absolute;
  height:1.5px;
  background:rgba(100,100,100,0.5);
  top:27px;
  border-radius:2px;
}
.c-whisker.l1{width:18px;left:-14px;transform:rotate(-5deg);}
.c-whisker.l2{width:16px;left:-12px;top:30px;transform:rotate(5deg);}
.c-whisker.r1{width:18px;right:-14px;transform:rotate(5deg);}
.c-whisker.r2{width:16px;right:-12px;top:30px;transform:rotate(-5deg);}

/* cat tail */
.c-tail{
  position:absolute;
  bottom:5px;right:-18px;
  width:28px;height:10px;
  border:4px solid #d4d4d4;
  border-left:none;
  border-radius:0 20px 20px 0;
  animation:tailSwish 1.5s ease-in-out infinite alternate;
}
@keyframes tailSwish{
  from{transform:rotate(-20deg);transform-origin:left center;}
  to{transform:rotate(20deg);transform-origin:left center;}
}

.c-foot{
  position:absolute;
  bottom:-8px;
  width:17px;height:10px;
  background:#d4d4d4;
  border-radius:50%;
}
.c-foot.left{left:5px;}
.c-foot.right{right:5px;}

.c-arm{
  position:absolute;
  width:11px;height:20px;
  background:#d4d4d4;
  border-radius:10px;
  bottom:28px;
  transition:transform 0.3s;
}
.c-arm.left{left:-3px;transform-origin:top center;transform:rotate(15deg);}
.c-arm.right{right:-3px;transform-origin:top center;transform:rotate(-15deg);}

/* ── PARTICLES ── */
.particle{
  position:absolute;
  pointer-events:none;
  font-size:16px;
  animation:particlePop 0.8s ease-out forwards;
  z-index:50;
}
@keyframes particlePop{
  0%{opacity:1;transform:scale(0) translateY(0);}
  50%{opacity:1;transform:scale(1.3) translateY(-20px);}
  100%{opacity:0;transform:scale(0.8) translateY(-40px);}
}

.tear-drop{
  position:absolute;
  width:5px;height:8px;
  background:#6bc5ff;
  border-radius:50% 50% 50% 50% / 30% 30% 70% 70%;
  animation:tearFall 0.9s ease-in forwards;
  pointer-events:none;
}
@keyframes tearFall{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(30px);}
}

.star-spin{
  position:absolute;
  font-size:18px;
  animation:starSpin 0.8s ease-out forwards;
  pointer-events:none;
}
@keyframes starSpin{
  0%{opacity:1;transform:rotate(0deg) translateY(0) scale(1);}
  100%{opacity:0;transform:rotate(360deg) translateY(-35px) scale(0.5);}
}

/* ── CHARACTER ANIMATIONS ── */
@keyframes idleFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

@keyframes happyBounce{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1);}
  20%{transform:translateY(-22px) scaleX(0.85) scaleY(1.15);}
  40%{transform:translateY(0) scaleX(1.1) scaleY(0.9);}
  60%{transform:translateY(-12px) scaleX(0.9) scaleY(1.1);}
  80%{transform:translateY(0) scaleX(1.05) scaleY(0.95);}
}

@keyframes backflip{
  0%{transform:translateY(0) rotate(0deg) scale(1);}
  25%{transform:translateY(-40px) rotate(90deg) scale(1.1);}
  50%{transform:translateY(-50px) rotate(180deg) scale(1.2);}
  75%{transform:translateY(-30px) rotate(270deg) scale(1.1);}
  100%{transform:translateY(0) rotate(360deg) scale(1);}
}

@keyframes sadDroop{
  0%,100%{transform:translateY(0) scaleX(1);}
  50%{transform:translateY(5px) scaleX(1.05);}
}

@keyframes smugStretch{
  0%,100%{transform:scaleX(1) scaleY(1);}
  50%{transform:scaleX(1.08) scaleY(0.94);}
}

@keyframes victoryDance{
  0%,100%{transform:translateY(0) rotate(0deg);}
  20%{transform:translateY(-15px) rotate(-10deg);}
  40%{transform:translateY(0) rotate(10deg);}
  60%{transform:translateY(-8px) rotate(-5deg);}
  80%{transform:translateY(0) rotate(5deg);}
}

@keyframes shaking{
  0%,100%{transform:rotate(0deg);}
  20%{transform:rotate(-15deg);}
  40%{transform:rotate(15deg);}
  60%{transform:rotate(-10deg);}
  80%{transform:rotate(10deg);}
}

@keyframes hammerRun{
  0%{transform:translateX(0);}
  100%{transform:translateX(220px);}
}

@keyframes getHit{
  0%{transform:translateX(0) rotate(0deg);}
  20%{transform:translateX(-15px) rotate(-20deg);}
  40%{transform:translateX(10px) rotate(15deg);}
  60%{transform:translateX(-8px) rotate(-10deg);}
  100%{transform:translateX(0) rotate(0deg);}
}

@keyframes flyOff{
  0%{transform:translateX(0) translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateX(200px) translateY(-80px) rotate(180deg);opacity:0;}
}

@keyframes celebrateSpin{
  0%{transform:rotate(0deg) scale(1);}
  25%{transform:rotate(90deg) scale(1.2);}
  50%{transform:rotate(180deg) scale(1);}
  75%{transform:rotate(270deg) scale(1.2);}
  100%{transform:rotate(360deg) scale(1);}
}

@keyframes smugCasual{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}

/* ── LOOP MSG ── */
#loopMsg{
  font-size:12px;
  color:#f48fb1;
  min-height:20px;
  margin-top:4px;
  font-style:italic;
}

/* ── BUTTONS ── */
#btnRow{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-top:12px;
  flex-wrap:wrap;
}

.choice-btn{
  font-family:'Quicksand',sans-serif;
  font-weight:700;
  font-size:17px;
  padding:12px 30px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing:1px;
}
.choice-btn:hover{transform:scale(1.08);}
.choice-btn:active{transform:scale(0.95);}

.yes-btn{
  background:linear-gradient(135deg,#ff1493,#ff69b4);
  color:white;
  box-shadow:0 6px 20px rgba(255,20,147,0.35);
}
.no-btn{
  background:white;
  color:#888;
  border:2px solid #ddd;
}

/* ── CONFETTI ── */
.confetti-piece{
  position:fixed;
  width:10px;height:10px;
  border-radius:2px;
  animation:confettiFall linear forwards;
  pointer-events:none;
  z-index:999;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(-20px) rotate(0deg);}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg);}
}

/* ── AUDIO PILL ── */
#audioPill{
  position:fixed;
  bottom:14px;right:14px;
  background:rgba(255,105,180,0.15);
  border:1px solid #ff69b4;
  border-radius:20px;
  padding:6px 14px;
  font-size:11px;
  color:#ff1493;
  z-index:300;
  cursor:pointer;
}

/* ════════════════════════
   TRANSITION SCREEN
════════════════════════ */
#transitionScreen{
  display:none;
  position:fixed;inset:0;
  background:black;
  z-index:500;
  align-items:center;
  justify-content:center;
}
.trans-text{
  font-family:'Orbitron',sans-serif;
  color:white;
  font-size:clamp(14px,3vw,22px);
  letter-spacing:5px;
  opacity:0;
  animation:fadeInText 3s forwards;
}
@keyframes fadeInText{
  0%{opacity:0;}
  30%{opacity:1;}
  70%{opacity:1;}
  100%{opacity:0;}
}

/* ════════════════════════
   PHASE 2 — BMW
════════════════════════ */
#phase2{
  display:none;
  position:fixed;inset:0;
  background:#050505;
  overflow:hidden;
  font-family:'Orbitron',sans-serif;
}

#roadCanvas{position:absolute;inset:0;z-index:0;}

#bmwCockpit{
  position:absolute;inset:0;
  z-index:10;pointer-events:none;
  transition:opacity 2s;
}

.top-arch{
  position:absolute;top:0;left:0;right:0;height:12%;
  background:linear-gradient(to bottom,#050505,transparent);
}
.pillar{position:absolute;top:0;width:13%;height:74%;}
.pillar.left{left:0;background:linear-gradient(to right,#050505,rgba(5,5,5,0.5));}
.pillar.right{right:0;background:linear-gradient(to left,#050505,rgba(5,5,5,0.5));}
.seat-edge{position:absolute;bottom:155px;width:18%;height:75px;background:linear-gradient(to top,#111,transparent);}
.seat-edge.left{left:0;border-top-right-radius:40px;}
.seat-edge.right{right:0;border-top-left-radius:40px;}

#steeringWheel{
  position:absolute;bottom:75px;left:50%;transform:translateX(-50%);
  width:105px;height:105px;
  border:8px solid #1a1a1a;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#2a2a2a,#0d0d0d);
  box-shadow:0 0 25px rgba(0,0,0,0.9),inset 0 0 15px rgba(255,255,255,0.04);
  z-index:11;pointer-events:none;
  animation:wheelIdle 3s ease-in-out infinite;
}
#steeringWheel::before{content:'';position:absolute;inset:10px;border-radius:50%;border:2px solid #222;}
#steeringWheel::after{content:'';position:absolute;top:50%;left:10px;right:10px;height:3px;background:#1a1a1a;transform:translateY(-50%);border-radius:2px;}

@keyframes wheelIdle{
  0%,100%{transform:translateX(-50%) rotate(-4deg);}
  50%{transform:translateX(-50%) rotate(4deg);}
}
@keyframes wheelSpin{
  0%{transform:translateX(-50%) rotate(0deg);}
  100%{transform:translateX(-50%) rotate(720deg);}
}

#rpmBar{position:absolute;bottom:155px;left:0;right:0;height:4px;background:rgba(255,255,255,0.05);z-index:12;}
#rpmFill{height:100%;width:0%;background:linear-gradient(to right,#003399,#0066b2,#cc0000);transition:width 0.2s;box-shadow:0 0 8px rgba(0,102,178,0.5);}

#bmwDash{
  position:absolute;bottom:0;left:0;right:0;height:155px;
  background:linear-gradient(to top,#030303 55%,transparent);
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:15px 8%;z-index:11;pointer-events:none;
}

.speedo{display:flex;flex-direction:column;align-items:center;gap:2px;}
.speedo-val{font-size:clamp(20px,4vw,34px);font-weight:900;color:white;text-shadow:0 0 20px rgba(255,255,255,0.4);letter-spacing:2px;}
.speedo-unit{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:3px;}

.bmw-brand{display:flex;flex-direction:column;align-items:center;gap:5px;}
.bmw-roundel{width:52px;height:52px;border-radius:50%;border:3px solid #666;position:relative;overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,0.08);}
.bmw-roundel::before{content:'';position:absolute;top:0;left:0;width:50%;height:50%;background:#0066b2;}
.bmw-roundel::after{content:'';position:absolute;bottom:0;right:0;width:50%;height:50%;background:#0066b2;}

#glassReflect{

<script>
// ══ FLOATERS ══
const floatEmojis=['👑','💖','🎀','✨','🌸','💅','💎','🌷'];
const floatersDiv=document.getElementById('floaters');
function makeFloaters(emojis){
  floatersDiv.innerHTML='';
  for(let i=0;i<16;i++){
    const f=document.createElement('div');
    f.className='floater';
    f.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    f.style.left=Math.random()*100+'vw';
    f.style.animationDuration=(7+Math.random()*8)+'s';
    f.style.animationDelay=(-Math.random()*10)+'s';
    floatersDiv.appendChild(f);
  }
}
makeFloaters(floatEmojis);

// ══ QUESTIONS ══
const questions=[
  {q:"We ni princess sindio? 👑",yS:"Pick YES!! 🎀",nS:"Zii bana! 😤",nM1:"Hmm... sure sure? 👀",nM2:"Last chance kubali... 👀"},
  {q:"Unapenda  pink? 🩷",yS:"Obviously pink! 💕",nS:"Blue hadi mwisho! 😤",nM1:"Hadi kidogo? 🤔",nM2:"mara ya mwisho?? 🧐"},
  {q:"Do you have dolls? 🪆",yS:"Dolls are life! 🎀",nS:"sina 😤",nM1:"Hadi moja? 👀",nM2:"Uko na ile moja wewe 😂"},
  {q:"Haupendi futa... sindio? ⚽",yS:"Say nooo! 🙏",nS:"Say NO = YES here 😂",nM1:"Wait unapenda sana? 👀",nM2:"Princess anapenda futa? 😏"}
];

let qIndex=0,loopCount=0,busy=false;

const questionEl=document.getElementById('question');
const loopMsgEl=document.getElementById('loopMsg');
const noBtn=document.getElementById('noBtn');
const bunnyWrap=document.getElementById('bunnyWrap');
const catWrap=document.getElementById('catWrap');
const bunnySpeech=document.getElementById('bunnySpeech');
const catSpeech=document.getElementById('catSpeech');
const bunnyMouth=document.getElementById('bunnyMouth');
const catMouth=document.getElementById('catMouth');
const bunnyChar=document.getElementById('bunnyChar');
const catChar=document.getElementById('catChar');
const bunnyArmL=document.getElementById('bunnyArmL');
const bunnyArmR=document.getElementById('bunnyArmR');

function showSpeech(el,txt){el.textContent=txt;el.style.opacity='1';}
function hideSpeech(el){el.style.opacity='0';}
function setMouth(el,state){
  const styles={
    happy:'border-radius:0 0 10px 10px;border-top:none;border-bottom:2px solid #333;height:7px;',
    sad:'border-radius:10px 10px 0 0;border-bottom:none;border-top:2px solid #333;height:7px;top:33px;',
    open:'border-radius:0 0 8px 8px;border-top:none;height:11px;background:#ff6b8a;',
    smug:'border-radius:0 0 5px 5px;border-top:none;height:4px;width:10px;'
  };
  el.style.cssText+=(styles[state]||styles.happy);
}
function animChar(el,anim,dur=null){
  el.style.animation=anim+(dur?` ${dur}s`:'');
}
function resetChar(el){el.style.animation='';}

function spawnParticles(container,emojis,count=4){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=(10+i*20)+'px';
    p.style.top='10px';
    p.style.animationDelay=(i*0.1)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function spawnTears(container,count=3){
  for(let i=0;i<count;i++){
    const t=document.createElement('div');
    t.className='tear-drop';
    t.style.left=(20+i*12)+'px';
    t.style.top='25px';
    t.style.animationDelay=(i*0.15)+'s';
    container.appendChild(t);
    setTimeout(()=>t.remove(),1100);
  }
}

function spawnStars(container,count=3){
  const starEmojis=['⭐','💫','✨'];
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='star-spin';
    s.textContent=starEmojis[i%starEmojis.length];
    s.style.left=(5+i*22)+'px';
    s.style.top='5px';
    s.style.animationDelay=(i*0.12)+'s';
    container.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function loadQuestion(){
  const q=questions[qIndex];
  questionEl.textContent=q.q;
  loopMsgEl.textContent='';
  loopCount=0;busy=false;
  noBtn.style.display='';noBtn.style.opacity='1';
  hideSpeech(bunnySpeech);hideSpeech(catSpeech);
  resetChar(bunnyWrap);resetChar(catWrap);
  bunnyMouth.style.cssText='';catMouth.style.cssText='';
  setMouth(bunnyMouth,'happy');setMouth(catMouth,'smug');
  // idle float
  setTimeout(()=>{
    bunnyWrap.style.animation='idleFloat 2s ease-in-out infinite';
    catWrap.style.animation='idleFloat 2.3s ease-in-out infinite 0.3s';
  },200);
}
loadQuestion();

// Hover effects
document.getElementById('yesBtn').addEventListener('mouseenter',()=>{
  if(qIndex>=questions.length)return;
  animChar(bunnyWrap,'happyBounce 0.6s ease infinite');
  setMouth(bunnyMouth,'open');
  showSpeech(bunnySpeech,questions[qIndex].yS);
});
document.getElementById('yesBtn').addEventListener('mouseleave',()=>{
  animChar(bunnyWrap,'idleFloat 2s ease-in-out infinite');
  setMouth(bunnyMouth,'happy');
  hideSpeech(bunnySpeech);
});
noBtn.addEventListener('mouseenter',()=>{
  if(noBtn.style.display==='none')return;
  animChar(catWrap,'smugStretch 0.8s ease infinite');
  setMouth(catMouth,'open');
  showSpeech(catSpeech,questions[qIndex].nS);
});
noBtn.addEventListener('mouseleave',()=>{
  animChar(catWrap,'idleFloat 2.3s ease-in-out infinite 0.3s');
  setMouth(catMouth,'smug');
  hideSpeech(catSpeech);
});

// ══ PICK YES ══
function pickYes(){
  if(busy)return;busy=true;
  hideSpeech(bunnySpeech);hideSpeech(catSpeech);

  // Bunny backflip
  animChar(bunnyWrap,'backflip 0.7s cubic-bezier(0.34,1.56,0.64,1)');
  setMouth(bunnyMouth,'open');
  showSpeech(bunnySpeech,'🎉 YESSS!!');
  spawnParticles(bunnyChar,['🎉','✨','💖','👑']);

  // Cat sad
  animChar(catWrap,'sadDroop 0.8s ease infinite');
  setMouth(catMouth,'sad');
  spawnTears(catChar,3);
  showSpeech(catSpeech,'😢 Nooo...');

  setTimeout(()=>{
    hideSpeech(bunnySpeech);hideSpeech(catSpeech);
    qIndex++;
    if(qIndex<questions.length){loadQuestion();}
    else{triggerReveal();}
  },1500);
}

// ══ PICK NO ══
function pickNo(){
  if(busy)return;
  loopCount++;
  const q=questions[qIndex];

  if(loopCount===1){
    busy=true;
    // Cat victory dance
    animChar(catWrap,'victoryDance 0.5s ease infinite');
    setMouth(catMouth,'open');
    showSpeech(catSpeech,'😂 HA! Good!');
    spawnParticles(catChar,['😂','🎉','💪']);
    // Bunny crosses arms, unimpressed
    animChar(bunnyWrap,'idleFloat 2s ease-in-out infinite');
    setMouth(bunnyMouth,'sad');
    showSpeech(bunnySpeech,'😒 Really Ivy...');
    spawnTears(bunnyChar,2);
    loopMsgEl.textContent=q.nM1;

    setTimeout(()=>{
      hideSpeech(bunnySpeech);hideSpeech(catSpeech);
      animChar(catWrap,'idleFloat 2.3s ease-in-out infinite');
      setMouth(bunnyMouth,'happy');setMouth(catMouth,'smug');
      busy=false;
    },1400);

  } else if(loopCount===2){
    busy=true;
    loopMsgEl.textContent=q.nM2;

    // Bunny gets DANGEROUS energy
    animChar(bunnyWrap,'shaking 0.4s ease');
    setMouth(bunnyMouth,'open');
    showSpeech(bunnySpeech,'Oh... OH. 🔨');

    setTimeout(()=>{
      hideSpeech(bunnySpeech);
      hideSpeech(catSpeech);

      // HAMMER SEQUENCE 🔨
      loopMsgEl.textContent='🐰 has had enough 😂';

      // Bunny raises arm (hammer)
      bunnyArmR.style.transform='rotate(-120deg)';
      showSpeech(bunnySpeech,'🔨 BONK!!');

      // Bunny runs across
      animChar(bunnyWrap,'hammerRun 0.5s ease-in forwards');

      setTimeout(()=>{
        // Cat gets hit
        spawnStars(catChar,4);
        animChar(catWrap,'getHit 0.4s ease');
        setMouth(catMouth,'open');
        showSpeech(catSpeech,'😵 OW!!');

        setTimeout(()=>{
          // Cat flies off
          animChar(catWrap,'flyOff 0.6s ease-in forwards');
          spawnTears(catChar,5);

          setTimeout(()=>{
            // NO button disappears
            noBtn.style.display='none';
            loopMsgEl.textContent='The NO button has been BONKED away 😂🔨';

            // Bunny walks back, dusts hands
            bunnyArmR.style.transform='rotate(-15deg)';
            animChar(bunnyWrap,'idleFloat 2s ease-in-out infinite');
            hideSpeech(bunnySpeech);
            showSpeech(bunnySpeech,'😌 As I was saying...');
            spawnParticles(bunnyChar,['😂','👑','✨']);

            setTimeout(()=>{
              hideSpeech(bunnySpeech);
              busy=false;
            },1200);
          },600);
        },400);
      },500);
    },800);
  }
}

// ══ CONFETTI ══
function launchConfetti(){
  const colors=['#ff69b4','#ff1493','#ffd700','#ff85c2','#fff','#c084fc','#0066b2'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.5)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}

// ══ TRIGGER REVEAL ══
function triggerReveal(){
  launchConfetti();
  animChar(bunnyWrap,'celebrateSpin 0.6s ease 3');
  showSpeech(bunnySpeech,'👑 I told you!!');

  setTimeout(()=>{
    const ts=document.getElementById('transitionScreen');
    ts.style.display='flex';
    document.getElementById('barbieAudio').pause();
    document.getElementById('maskoffAudio').play();
    setTimeout(()=>{
      ts.style.display='none';
      document.getElementById('phase1').style.display='none';
      floatersDiv.innerHTML='';
      document.getElementById('phase2').style.display='block';
      startBMW();
    },3200);
  },1200);
}

// ══ BMW POV ══
const canvas=document.getElementById('roadCanvas');
const ctx=canvas.getContext('2d');
let W,H,roadLines=[],trees=[],speed=0,speedoNum=0,gearNum=1,accelPhase=0,bmwFrame;

function resizeCanvas(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function initRoad(){
  roadLines=[];
  for(let i=0;i<20;i++) roadLines.push({z:Math.random()*1000});
  trees=[];
  for(let i=0;i<14;i++) trees.push({z:Math.random()*1000,side:Math.random()>0.5?1:-1,h:60+Math.random()*80});
}
initRoad();

function drawRoad(){
  const cx=W/2,hz=H*0.38;
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,hz);
  sky.addColorStop(0,'#080810');sky.addColorStop(1,'#141428');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,hz);
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=0;i<90;i++){ctx.fillRect((i*137.5)%W,(i*79.3)%hz,1,1);}
  // Road
  const rd=ctx.createLinearGradient(0,hz,0,H);
  rd.addColorStop(0,'#181818');rd.addColorStop(1,'#0d0d0d');
  ctx.fillStyle=rd;
  ctx.beginPath();
  ctx.moveTo(cx-W*0.09,hz);ctx.lineTo(cx+W*0.09,hz);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // Road edges
  ctx.strokeStyle='rgba(255,200,100,0.12)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-W*0.09,hz);ctx.lineTo(0,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+W*0.09,hz);ctx.lineTo(W,H);ctx.stroke();
  // Dashes
  roadLines.forEach(l=>{
    l.z-=speed*3;if(l.z<=1)l.z=1000;
    const sc=1000/l.z;
    const ly=hz+(H-hz)*((1000-l.z)/1000);
    const lw=Math.max(0.5,18*sc*0.015);
    const lh=Math.max(2,38*sc*0.015);
    const alpha=Math.min(1,(1000-l.z)/800);
    if(ly>hz&&ly<H){ctx.fillStyle=`rgba(255,215,90,${alpha*0.65})`;ctx.fillRect(cx-lw/2,ly,lw,lh);}
  });
  // Trees
  trees.forEach(t=>{
    t.z-=speed*2;if(t.z<=1)t.z=1000;
    const sc=1000/t.z;
    const ty=hz+(H-hz)*((1000-t.z)/1000);
    const alpha=Math.min(0.65,(1000-t.z)/800);
    const tx=cx+(t.side*(W*0.13+55*sc));
    if(ty>hz&&ty<H){
      ctx.fillStyle=`rgba(18,38,18,${alpha})`;
      ctx.fillRect(tx-3*sc,ty-t.h*sc*0.3,5*sc,t.h*sc*0.3);
      ctx.beginPath();
      ctx.moveTo(tx,ty-t.h*sc*0.3-18*sc);
      ctx.lineTo(tx-11*sc,ty-t.h*sc*0.3);
      ctx.lineTo(tx+11*sc,ty-t.h*sc*0.3);
      ctx.closePath();
      ctx.fillStyle=`rgba(12,45,12,${alpha})`;ctx.fill();
    }
  });
  // Headlight glow
  const hl=ctx.createRadialGradient(cx,H,0,cx,H,H*0.65);
  hl.addColorStop(0,'rgba(255,240,200,0.07)');hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hl;ctx.fillRect(0,hz,W,H-hz);
}

function bmwLoop(){
  ctx.clearRect(0,0,W,H);drawRoad();
  if(accelPhase===0){speed+=0.07;if(speed>=8)accelPhase=1;}
  else if(accelPhase===1){speed+=0.35;}
  speed=Math.min(speed,62);
  speedoNum+=(speed*4-speedoNum)*0.05;
  document.getElementById('speedoVal').textContent=Math.round(speedoNum);
  const g=speed<5?1:speed<14?2:speed<27?3:speed<44?4:speed<56?5:6;
  if(g!==gearNum){gearNum=g;document.getElementById('gearVal').textContent=gearNum;}
  document.getElementById('rpmFill').style.width=Math.min(100,(speed/62)*100)+'%';
  const sw=document.getElementById('steeringWheel');
  if(accelPhase===1&&speed>25){sw.style.animation=`wheelSpin ${Math.max(0.25,2-speed*0.025)}s linear infinite`;}
  if(speed>=60&&accelPhase===1){accelPhase=2;triggerArrival();}
  bmwFrame=requestAnimationFrame(bmwLoop);
}

function startBMW(){
  bmwLoop();
  setTimeout(()=>{accelPhase=1;},4500);
}

function triggerArrival(){
  cancelAnimationFrame(bmwFrame);
  const flash=document.getElementById('bmwFlash');
  flash.style.opacity='1';
  setTimeout(()=>{
    flash.style.opacity='0';
    document.getElementById('bmwCockpit').style.opacity='0';
    const msg=document.getElementById('bmwMessage');
    msg.style.opacity='1';
    document.querySelectorAll('.bmw-msg-line').forEach((l,i)=>{
      setTimeout(()=>l.classList.add('visible'),i*1200);
    });
  },800);
}

// ══ AUDIO ══
let muted=false;
function toggleMute(){
  muted=!muted;
  ['barbieAudio','mask offAudio'].forEach(id=>document.getElementById(id).muted=muted);
  document.getElementById('audioPill').textContent=muted?'🔇 TAP TO UNMUTE':'🎵 TAP TO MUTE';
}
document.body.addEventListener('click',()=>{
  const b=document.getElementById('barbieAudio');
  if(b.paused&&!muted)b.play();
},{once:true});
</script>
